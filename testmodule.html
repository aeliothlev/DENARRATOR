<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testmodule</title>
    <style>
      :root { --bg:#f6f3ea; --ink:#2f3132; --line:#b7b4ab; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top right, #faf7ef 0%, var(--bg) 65%);
        color: var(--ink);
        font-family: "Engebrechtre", "Avenir Next", "Segoe UI", sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .panel {
        width: min(760px, 92vw);
        border: 1px solid var(--line);
        padding: 18px;
        background: rgba(255,255,255,0.3);
        text-align: center;
      }
      .small { opacity: 0.72; font-size: 12px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <section class="panel">
      <strong>TESTMODULE</strong>
      <div class="small">EMPTY SANDBOX FOR UPCOMING IDEAS</div>
    </section>
  </body>
</html>
