<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RCF/RZB</title>
    <style>
      :root {
        --bg: #f6f3ea;
        --ink: #2f3132;
        --soft: #55585a;
        --line: #b7b4ab;
        --accent: #ebdbc2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top right, #faf7ef 0%, var(--bg) 65%);
        color: var(--ink);
        font-family: "Engebrechtre", "Avenir Next", "Segoe UI", sans-serif;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      main {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 6px;
        padding: 8px 12px 10px;
        min-height: 100vh;
      }
      .panel {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.2);
        padding: 6px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        gap: 6px;
      }
      .hidden {
        display: none !important;
      }
      button,
      input,
      select {
        border: 1px solid var(--ink);
        background: transparent;
        color: var(--ink);
        font: inherit;
        font-size: 11px;
        text-transform: uppercase;
        padding: 5px 8px;
      }
      input[type="range"] {
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
        height: 18px;
        border: 0;
        padding: 0;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 2px;
        background: rgba(47, 49, 50, 0.45);
        border: 1px solid rgba(47, 49, 50, 0.65);
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 18px;
        margin-top: -9px;
        border: 0;
        background: center / contain no-repeat url("./assets/slider-thumb.svg");
      }
      input[type="range"]::-moz-range-track {
        height: 2px;
        background: rgba(47, 49, 50, 0.45);
        border: 1px solid rgba(47, 49, 50, 0.65);
      }
      input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 18px;
        border: 0;
        border-radius: 0;
        background: center / contain no-repeat url("./assets/slider-thumb.svg");
      }
      button { cursor: pointer; }
      button[aria-pressed="true"] {
        background: var(--ink);
        color: var(--bg);
      }
      button:active:not(:disabled) {
        background-color: rgba(47, 49, 50, 0.14) !important;
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--ink);
      }
      .toggle input {
        appearance: none;
        -webkit-appearance: none;
        width: 40px;
        height: 18px;
        margin: 0;
        border: 0;
        background: center / contain no-repeat url("./assets/checkbox_inactive.svg");
        cursor: pointer;
      }
      .toggle input:checked {
        background-image: url("./assets/checkbox_active.svg");
      }
      .value {
        color: var(--soft);
        font-size: 11px;
      }
      .slots {
        border: 1px solid var(--line);
        padding: 6px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        overflow: auto;
      }
      .slot {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.35);
        padding: 6px;
        display: grid;
        gap: 5px;
      }
      .slot.active {
        border-color: #2f3132;
        background: color-mix(in srgb, var(--accent) 40%, white 60%);
      }
      .slot-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 5px;
      }
      .slot-name {
        color: var(--soft);
        font-size: 11px;
        min-height: 14px;
      }
      .slot-actions {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .status {
        color: var(--soft);
      }
      #waveCanvas {
        width: 100%;
        height: 88px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.45);
      }
      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr 1fr; }
        .slots { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="row" style="justify-content: space-between;">
          <strong>RCF / RZB</strong>
          <span id="loadedCount" class="value">0 / 10 LOADED</span>
        </div>
        <div class="row" style="margin-top: 6px;">
          <label>MODE
            <button id="modeBtn" type="button">MODE: RZB</button>
          </label>
        </div>
        <div id="rzbControls" class="grid" style="margin-top: 6px;">
          <label>FLAVOR
            <button id="flavorBtn" type="button">HYBRID</button>
          </label>
          <label>INTENSITY <span id="intensityValue" class="value">60%</span>
            <input id="intensityInput" type="range" min="0" max="100" step="1" value="60" />
          </label>
          <label>SMOOTH <span id="smoothValue" class="value">35%</span>
            <input id="smoothInput" type="range" min="0" max="100" step="1" value="35" />
          </label>
          <label>SEED
            <div class="row">
              <input id="seedInput" type="number" step="1" value="1337" style="width: 120px;" />
              <button id="reseedBtn" type="button">RESEED</button>
            </div>
          </label>
          <label>TIMEWARP
            <button id="timewarpBtn" type="button" aria-pressed="false">OFF</button>
          </label>
          <label>RATE (SEC) <span id="rateValue" class="value">4.0</span>
            <input id="rateInput" type="range" min="5" max="120" step="1" value="40" />
          </label>
          <label>DEPTH <span id="depthValue" class="value">50%</span>
            <input id="depthInput" type="range" min="0" max="100" step="1" value="50" />
          </label>
          <label>SHAPE
            <button id="shapeBtn" type="button">SINE</button>
          </label>
        </div>
        <div id="centrifugeControls" class="grid hidden" style="margin-top: 6px;">
          <label>FIBOMATIX
            <button id="fibBtn" type="button" aria-pressed="true">ON</button>
          </label>
          <label>BASE <span id="baseValue" class="value">25MS</span>
            <input id="baseInput" type="range" min="4" max="120" step="1" value="25" />
          </label>
          <label>MIN <span id="minValue" class="value">6MS</span>
            <input id="minInput" type="range" min="2" max="80" step="1" value="6" />
          </label>
          <label>MAX <span id="maxValue" class="value">250MS</span>
            <input id="maxInput" type="range" min="40" max="800" step="1" value="250" />
          </label>
          <label>XFADE <span id="xfadeValue" class="value">8MS</span>
            <input id="xfadeInput" type="range" min="0" max="40" step="1" value="8" />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="row">
          <button id="renderBtn" type="button">RENDER</button>
          <button id="playBtn" type="button">PLAY</button>
          <label class="toggle"><input id="loopBtn" type="checkbox" checked /> Loop: </label>
          <button id="saveBtn" type="button">SAVE WAV</button>
          <button id="sendBtn" type="button">TO LAZY</button>
          <select id="presetSelect"></select>
          <button id="applyPresetBtn" type="button">APPLY PRESET</button>
        </div>
        <canvas id="waveCanvas" width="1400" height="220"></canvas>
        <div class="row" style="justify-content: space-between; margin-top: 6px;">
          <span id="renderInfo" class="value">TEMP: NONE</span>
          <span id="status" class="status">READY</span>
        </div>
      </section>

      <section id="slots" class="slots"></section>
    </main>

    <input id="fileInput" type="file" accept="audio/*,.wav,.aif,.aiff" hidden />
    <script type="module" src="./rcf_rzb.js"></script>
  </body>
</html>
