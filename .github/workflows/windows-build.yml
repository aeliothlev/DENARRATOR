name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Prepare frontend dist
        run: npm run prepare:dist

      - name: Build Tauri Windows installers (NSIS + MSI)
        run: npx tauri build --bundles nsis,msi

      - name: Debug bundle output
        shell: pwsh
        run: |
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse | Select-Object FullName

      - name: Upload MSI bundle
        uses: actions/upload-artifact@v4
        with:
          name: denarrator-windows-msi
          path: src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn

      - name: Upload NSIS bundle
        uses: actions/upload-artifact@v4
        with:
          name: denarrator-windows-nsis
          path: src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: warn

      - name: Upload Windows app bundle (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: denarrator-windows-app
          path: src-tauri/target/release/bundle/**/*.zip
          if-no-files-found: warn
