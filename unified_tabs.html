        hostIzerOutGain = null;
        hostIzerFilters = null;
      }

      function clampNum(value, lo, hi, fallback) {
        const v = Number(value);
        if (!Number.isFinite(v)) return fallback;
        return Math.max(lo, Math.min(hi, v));
      }

      function sanitizeIzerParams(raw) {
        const payload = raw && typeof raw === 'object' ? raw : {};
        const bandsIn = payload.bands && typeof payload.bands === 'object' ? payload.bands : {};
        return {
          enabled: payload.enabled !== false,
          mix: clampNum(payload.mix, 0, 1, 0.25),
          bands: {
            hpf: {
              enabled: bandsIn.hpf?.enabled !== false,
              freq: clampNum(bandsIn.hpf?.freq, 20, 400, 20),
              q: clampNum(bandsIn.hpf?.q, 0.3, 2.5, 0.7),
            },
            low: {
              enabled: bandsIn.low?.enabled !== false,
              freq: clampNum(bandsIn.low?.freq, 60, 300, 120),
              gainDb: clampNum(bandsIn.low?.gainDb, -12, 12, 0),
            },
            mid1: {
              enabled: bandsIn.mid1?.enabled !== false,
              freq: clampNum(bandsIn.mid1?.freq, 200, 4000, 800),
              gainDb: clampNum(bandsIn.mid1?.gainDb, -18, 18, 0),
              q: clampNum(bandsIn.mid1?.q, 0.3, 2.0, 0.7),
            },
            mid2: {
              enabled: bandsIn.mid2?.enabled !== false,
              freq: clampNum(bandsIn.mid2?.freq, 2000, 10000, 4500),
              gainDb: clampNum(bandsIn.mid2?.gainDb, -18, 18, 0),
              q: clampNum(bandsIn.mid2?.q, 0.3, 2.0, 0.7),
            },
            high: {
              enabled: bandsIn.high?.enabled !== false,
              freq: clampNum(bandsIn.high?.freq, 4000, 16000, 9000),
              gainDb: clampNum(bandsIn.high?.gainDb, -12, 12, 0),
            },
          },
        };
      }

      function applyHostIzerState(raw) {
        hostIzerState = sanitizeIzerParams(raw);
        try { localStorage.setItem('denarrator.izer.host', JSON.stringify(hostIzerState)); } catch {}
        if (!hostAudioContext || !hostIzerFilters || !hostIzerDryGain || !hostIzerWetGain) return;
        const now = hostAudioContext.currentTime;
        const tc = 0.035;
        const mix = hostIzerState.enabled ? hostIzerState.mix : 0;
        hostIzerDryGain.gain.setTargetAtTime(1 - mix, now, tc);
        hostIzerWetGain.gain.setTargetAtTime(mix, now, tc);
        const b = hostIzerState.bands;
        hostIzerFilters.hpf.frequency.setTargetAtTime(b.hpf.enabled ? b.hpf.freq : 20, now, tc);
        hostIzerFilters.hpf.Q.setTargetAtTime(b.hpf.q, now, tc);
        hostIzerFilters.low.frequency.setTargetAtTime(b.low.freq, now, tc);
        hostIzerFilters.low.gain.setTargetAtTime(b.low.enabled ? b.low.gainDb : 0, now, tc);
        hostIzerFilters.mid1.frequency.setTargetAtTime(b.mid1.freq, now, tc);
        hostIzerFilters.mid1.Q.setTargetAtTime(b.mid1.q, now, tc);
        hostIzerFilters.mid1.gain.setTargetAtTime(b.mid1.enabled ? b.mid1.gainDb : 0, now, tc);
        hostIzerFilters.mid2.frequency.setTargetAtTime(b.mid2.freq, now, tc);
        hostIzerFilters.mid2.Q.setTargetAtTime(b.mid2.q, now, tc);
        hostIzerFilters.mid2.gain.setTargetAtTime(b.mid2.enabled ? b.mid2.gainDb : 0, now, tc);
        hostIzerFilters.high.frequency.setTargetAtTime(b.high.freq, now, tc);
        hostIzerFilters.high.gain.setTargetAtTime(b.high.enabled ? b.high.gainDb : 0, now, tc);
      }

      function mapEq16ToHostIzerParams(payload) {
        const p = payload && typeof payload === 'object' ? payload : {};
        const bands = Array.isArray(p.bands) ? p.bands : [];
        const get = (idx, fallback = 0) => {
          const v = Number(bands[idx]);
          if (!Number.isFinite(v)) return fallback;
          return Math.max(-24, Math.min(24, v));
        };
        return {
          enabled: true,
          mix: 1,
          bands: {
            hpf: { enabled: true, freq: get(0) < -4 ? 70 : get(1) < -3 ? 55 : get(2) < -2 ? 40 : 20, q: 0.7 },
            low: { enabled: true, freq: 120, gainDb: Math.max(-12, Math.min(12, (get(2) + get(3) + get(4) + get(5)) / 4)) },
            mid1: { enabled: true, freq: 800, q: 0.8, gainDb: Math.max(-18, Math.min(18, (get(6) + get(7) + get(8) + get(9)) / 4)) },
            mid2: { enabled: true, freq: 4500, q: 0.8, gainDb: Math.max(-18, Math.min(18, (get(10) + get(11) + get(12)) / 3)) },
            high: { enabled: true, freq: 10000, gainDb: Math.max(-12, Math.min(12, (get(13) + get(14) + get(15)) / 3)) },
          },
        };
      }

      async function ensureHostTapRuntime() {
        if (hostTapReady && hostTapStream && hostTapAudioContext && hostTapAnalyserL && hostTapAnalyserR && hostTapAnalyserF) {
          return true;
        }
        if (hostTapRequested) {
          return false;
        }
        const getDisplayMedia = navigator?.mediaDevices?.getDisplayMedia;
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (typeof getDisplayMedia !== 'function' || !AudioCtx) {
          return false;
        }
        hostTapRequested = true;
        try {
          const stream = await getDisplayMedia.call(navigator.mediaDevices, { audio: true, video: true });
          try {
            stream.getVideoTracks?.().forEach((track) => track.stop());
          } catch {}
          const audioTracks = stream.getAudioTracks?.() || [];
          if (!audioTracks.length) {
            try { stream.getTracks().forEach((track) => track.stop()); } catch {}
            hostTapRequested = false;
            return false;
          }
          const tapCtx = new AudioCtx({ latencyHint: 'interactive' });
          const source = tapCtx.createMediaStreamSource(stream);
          const splitter = tapCtx.createChannelSplitter(2);
          const analyserL = tapCtx.createAnalyser();
          const analyserR = tapCtx.createAnalyser();
          const analyserF = tapCtx.createAnalyser();
          analyserL.fftSize = 2048;
          analyserR.fftSize = 2048;
          analyserF.fftSize = 2048;
          analyserF.smoothingTimeConstant = 0.65;
          source.connect(splitter);
          splitter.connect(analyserL, 0);
          splitter.connect(analyserR, 1);
          source.connect(analyserF);
          hostTapStream = stream;
          hostTapAudioContext = tapCtx;
          hostTapSource = source;
          hostTapSplitter = splitter;
          hostTapAnalyserL = analyserL;
          hostTapAnalyserR = analyserR;
          hostTapAnalyserF = analyserF;
          hostTapReady = true;
          showMidiToast('Master tap ready');
          return true;
        } catch {
          hostTapReady = false;
          return false;
        } finally {
          hostTapRequested = false;
        }
      }

      async function releaseHostTapRuntime() {
        if (globalRecActive || nuklearSubscribed) return;
        try { hostTapSource?.disconnect(); } catch {}
        try { hostTapSplitter?.disconnect(); } catch {}
        try { hostTapAnalyserL?.disconnect(); } catch {}
        try { hostTapAnalyserR?.disconnect(); } catch {}
        try { hostTapAnalyserF?.disconnect(); } catch {}
        hostTapSource = null;
        hostTapSplitter = null;
        hostTapAnalyserL = null;
        hostTapAnalyserR = null;
        hostTapAnalyserF = null;
        if (hostTapAudioContext) {
          try { await hostTapAudioContext.close(); } catch {}
        }
        hostTapAudioContext = null;
        if (hostTapStream) {
          try { hostTapStream.getTracks().forEach((track) => track.stop()); } catch {}
        }
        hostTapStream = null;
        hostTapReady = false;
      }

      async function handleCliplibAdd(data, sourceFrame) {
        const invoke = getInvoke();
        if (!invoke) {
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_ERR',
            version: 1,
            error: 'No native invoke bridge available',
          });
          return;
        }
        const wavBytesBase64 = coerceBase64(data.wavBytesBase64 || data.wavBytesB64 || data.wavBase64);
        if (!wavBytesBase64) {
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_ERR',
            version: 1,
            error: 'Missing wav bytes',
          });
          return;
        }
        const suggestedName = String(data.name || 'i2_clip').trim() || 'i2_clip';
        const target = String(data.target || 'lazy');

        if (target === 'morphA' || target === 'morphB') {
          postToFrame(morphFrame, {
            type: 'DENARRATOR_IMPORT_CLIP',
            version: 1,
            targetSlot: target === 'morphA' ? 'A' : 'B',
            name: suggestedName,
            wavBytesBase64,
            meta: data.meta || null,
          });
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            target,
            name: suggestedName,
          });
          return;
        }

        if (target === 'mirrorA' || target === 'mirrorB') {
          postToFrame(mirrorFrame, {
            type: 'DENARRATOR_IMPORT_CLIP',
            version: 1,
            targetSlot: target === 'mirrorA' ? 'A' : 'B',
            name: suggestedName,
            wavBytesBase64,
            meta: data.meta || null,
          });
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            target,
            name: suggestedName,
          });
          return;
        }

        if (target === 'algebraA' || target === 'algebraB') {
          postToFrame(algebraFrame, {
            type: 'DENARRATOR_IMPORT_CLIP',
            version: 1,
            targetSlot: target === 'algebraA' ? 'A' : 'B',
            name: suggestedName,
            wavBytesBase64,
            meta: data.meta || null,
          });
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            target,
            name: suggestedName,
          });
          return;
        }

        if (target === 'rcf') {
          postToFrame(rcfFrame, {
            type: 'DENARRATOR_IMPORT_CLIP',
            version: 1,
            targetSlot: data?.targetSlot ?? null,
            name: suggestedName,
            wavBytesBase64,
            meta: data.meta || null,
          });
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            target,
            name: suggestedName,
          });
          return;
        }

        if (target === 'testmodule') {
          postToFrame(testmoduleFrame, {
            type: 'DENARRATOR_IMPORT_CLIP',
            version: 1,
            targetSlot: data?.targetSlot ?? null,
            name: suggestedName,
            wavBytesBase64,
            meta: data.meta || null,
          });
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            target,
            name: suggestedName,
          });
          return;
        }

        if (target === 'negInput' || target === 'negExternal') {
          postToFrame(negFrame, {
            type: 'DENARRATOR_IMPORT_CLIP',
            version: 1,
            targetSlot: target === 'negInput' ? 'input' : 'external',
            name: suggestedName,
            wavBytesBase64,
            meta: data.meta || null,
          });
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            target,
            name: suggestedName,
          });
          return;
        }

        if (target === 'i2') {
          postToFrame(i2Frame, {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            target,
            name: suggestedName,
          });
          return;
        }

        try {
          const result = await invoke('cliplib_write_wav', {
            dataBase64: wavBytesBase64,
            suggestedName,
          });
          const payload = {
            type: 'CLIPLIB_ADD_OK',
            version: 1,
            clipId: result?.clip_id || '',
            path: result?.path || '',
            name: result?.name || suggestedName,
            meta: data.meta || null,
            target,
          };
          postToFrame(sourceFrame, payload);
          if (target === 'lazy') {
            postToFrame(lazyFrame, {
              type: 'CLIPLIB_UPDATED',
              version: 1,
              clipId: payload.clipId,
              path: payload.path,
              name: payload.name,
              meta: payload.meta,
              wavBytesBase64,
              source: 'i2',
            });
          }
        } catch (error) {
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_ADD_ERR',
            version: 1,
            error: String(error?.message || error || 'cliplib write failed'),
          });
        }
      }

      async function handleCliplibListRequest(requestId, sourceFrame) {

          postToFrame(sourceFrame, {
            type: 'CLIPLIB_LIST_ERR',
            version: 1,
            requestId,
            error: 'No native invoke bridge available',

        try {
          const items = await invoke('cliplib_list');
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_LIST_RES',
            version: 1,
            requestId,
            items: Array.isArray(items) ? items : [],
          });
        } catch (error) {
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_LIST_ERR',
            version: 1,
            requestId,
            error: String(error?.message || error || 'cliplib list failed'),
          });
        }
      }

      async function handleCliplibWavRequest(path, requestId, sourceFrame) {
        const invoke = getInvoke();
        if (!invoke || typeof path !== 'string' || !path) {
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_WAV_ERR',
            version: 1,
            requestId,
            error: 'Invalid wav request',
          });
          return;
        }
        try {
          const wavBytesBase64 = await invoke('cliplib_read_wav_base64', { path });
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_WAV_RES',
            version: 1,
            requestId,
            path,
            wavBytesBase64,
          });
        } catch (error) {
          postToFrame(sourceFrame, {
            type: 'CLIPLIB_WAV_ERR',
            version: 1,
            requestId,
            error: String(error?.message || error || 'cliplib wav read failed'),

      window.addEventListener('message', (event) => {
        const data = event?.data;
        if (!data || typeof data.type !== 'string') return;
        if (data.type === 'HUD_SET') {
          const payload = (data && typeof data.payload === 'object' && data.payload) ? data.payload : data;
          hudSet(payload?.text ?? 'READY', payload?.priority ?? 1, payload?.ttlMs ?? 1500);
          return;
        }
        if (data.type === 'denarrator-meter') {
          const next = Number(data.level);
          if (!Number.isFinite(next)) return;
          const clamped = Math.max(0, Math.min(1, next));
          meterTarget = Math.max(meterTarget, clamped);
          const paneId = paneIdFromSource(event.source);
          if (paneId && paneSoundState.has(paneId)) {

        if (data.type === 'NUKLEAR_SUBSCRIBE' && data.version === 1 && event.source === nuklearFrame?.contentWindow) {
          nuklearSubscribed = true;

          const reqFft = Math.round(Number(data?.payload?.fftSize) || 512);
          nuklearFps = Math.max(10, Math.min(60, reqFps));

        if (data.type === 'NUKLEAR_UNSUBSCRIBE' && data.version === 1 && event.source === nuklearFrame?.contentWindow) {

        if (data.type === 'NUKLEAR_CONFIG' && data.version === 1 && event.source === nuklearFrame?.contentWindow) {

        if (data.type === 'SESSION_EXPORT_RES' && data.version === 1) {
          if (!sessionExportCollector) return;
          const moduleId = String(data?.payload?.moduleId || '');
          const chunk = data?.payload?.chunk;

          sessionExportCollector.dirtyByModule[moduleId] = Boolean(data?.payload?.dirty);
          setModuleDirty(moduleId, Boolean(data?.payload?.dirty));

        if (data.type === 'DIRTY_ON' && data.version === 1) {
          const paneId = paneIdFromSource(event.source);
          const fallbackModule = paneId ? paneIdToModuleId(paneId) : '';
          const moduleId = String(data?.payload?.moduleId || fallbackModule);
          if (!moduleId) return;

        if (data.type === 'DIRTY_OFF' && data.version === 1) {

          const moduleId = String(data?.payload?.moduleId || fallbackModule);
          if (!moduleId) return;
          setModuleDirty(moduleId, false);

        if (data.type === 'MODULE_RESET_ACK' && data.version === 1) {
          return;
        }
        if (data.type === 'MIDI_LEARN_ARM_TARGET' && data.version === 1) {
          if (!midiMapMode) return;

        if (data.type === 'DENARRATOR_GLOBAL_TOGGLE' && data.version === 1) {
          const fromKnownFrame = frameEls.some((frame) => frame?.contentWindow === event.source);

        if (data.type === 'BROWSER_REQUEST_LOAD' && data.version === 1) {

        if (data.type === 'BROWSER_REQUEST_LOAD_SESH' && data.version === 1) {

        if (data.type === 'PATHS_REQ' && data.version === 1) {
          if (denPaths && event.source && typeof event.source.postMessage === 'function') {
            event.source.postMessage({
              type: 'PATHS_BROADCAST',

        if (data.version !== 1) return;
        if ((data.type === 'CLIPLIB_ADD' || data.type === 'DENARRATOR_AUDIO_SEND') &&
          (event.source === i2Frame?.contentWindow
            || event.source === primFrame?.contentWindow
            || event.source === rcfFrame?.contentWindow
            || event.source === testmoduleFrame?.contentWindow
            || event.source === thereminFrame?.contentWindow
            || event.source === particlesFrame?.contentWindow
            || event.source === pictonalFrame?.contentWindow
            || event.source === projektorFrame?.contentWindow)) {

              : event.source === testmoduleFrame?.contentWindow

              : event.source === thereminFrame?.contentWindow
                ? thereminFrame
                : event.source === particlesFrame?.contentWindow
                  ? particlesFrame
                  : event.source === pictonalFrame?.contentWindow
                    ? pictonalFrame
                    : event.source === projektorFrame?.contentWindow

              : i2Frame;
          void handleCliplibAdd(data, sourceFrame);
          return;
        }
        if (data.type === 'CLIPLIB_LIST_REQ' &&
          (event.source === lazyFrame?.contentWindow
            || event.source === rcfFrame?.contentWindow
            || event.source === testmoduleFrame?.contentWindow
            || event.source === thereminFrame?.contentWindow
            || event.source === particlesFrame?.contentWindow
            || event.source === pictonalFrame?.contentWindow
            || event.source === projektorFrame?.contentWindow)) {
          const sourceFrame = event.source === rcfFrame?.contentWindow

            : event.source === testmoduleFrame?.contentWindow
              ? testmoduleFrame
            : event.source === thereminFrame?.contentWindow
              ? thereminFrame
              : event.source === particlesFrame?.contentWindow
                ? particlesFrame
                : event.source === pictonalFrame?.contentWindow
                  ? pictonalFrame
                  : event.source === projektorFrame?.contentWindow
                    ? projektorFrame
                : lazyFrame;
          void handleCliplibListRequest(data.requestId || null, sourceFrame);
          return;

        if (data.type === 'CLIPLIB_WAV_REQ' &&
          (event.source === lazyFrame?.contentWindow
            || event.source === rcfFrame?.contentWindow
            || event.source === testmoduleFrame?.contentWindow
            || event.source === thereminFrame?.contentWindow
            || event.source === particlesFrame?.contentWindow
            || event.source === pictonalFrame?.contentWindow

            : event.source === thereminFrame?.contentWindow

                  : event.source === projektorFrame?.contentWindow

      async function triggerPanicKill() {

        broadcastToAllFrames({ type: 'GLOBAL_PLAY_CLEAR', version: 1 });

        try {

      async function startGlobalRecording() {
        if (globalRecActive) return;
        const tapOk = await ensureHostTapRuntime();
        if (!tapOk || !hostTapStream || !hostTapAudioContext) {
          return;
        }
        globalRecStream = hostTapStream;
        globalRecChunksL = [];
        globalRecChunksR = [];
        globalRecFrames = 0;
        const tapSource = hostTapAudioContext.createMediaStreamSource(hostTapStream);
        const processor = hostTapAudioContext.createScriptProcessor(2048, 2, 2);
        const sinkGain = hostTapAudioContext.createGain();
        sinkGain.gain.value = 0;
        processor.onaudioprocess = (event) => {
          if (!globalRecActive) return;
          const input = event.inputBuffer;
          const l = input.getChannelData(0);
          const r = input.numberOfChannels > 1 ? input.getChannelData(1) : l;
          globalRecChunksL.push(new Float32Array(l));
          globalRecChunksR.push(new Float32Array(r));
          globalRecFrames += l.length;
        };
        tapSource.connect(processor);
        processor.connect(sinkGain);
        sinkGain.connect(hostTapAudioContext.destination);
        globalRecTapSource = tapSource;
        globalRecProcessor = processor;
        globalRecSinkGain = sinkGain;
        globalRecActive = true;
        globalRecBtn?.setAttribute('aria-pressed', 'true');
        showMidiToast('Rec sum started');
      }

      async function stopGlobalRecording() {
        if (!globalRecActive) return;
        globalRecActive = false;
        globalRecBtn?.setAttribute('aria-pressed', 'false');
        try { globalRecTapSource?.disconnect(); } catch {}
        try { globalRecProcessor?.disconnect(); } catch {}
        try { globalRecSinkGain?.disconnect(); } catch {}
        globalRecTapSource = null;
        globalRecProcessor = null;
        globalRecSinkGain = null;
        globalRecStream = null;
        if (!globalRecFrames || !globalRecChunksL.length) {
          globalRecChunksL = [];
          globalRecChunksR = [];
          globalRecFrames = 0;
          return;
        }
        const sr = Math.max(1, Math.floor(hostTapAudioContext?.sampleRate || 48000));
        const channels = 2;
        const dataBytes = globalRecFrames * channels * 2;
        const wav = new ArrayBuffer(44 + dataBytes);
        const dv = new DataView(wav);
        const write = (offset, text) => {
          for (let i = 0; i < text.length; i += 1) dv.setUint8(offset + i, text.charCodeAt(i));
        };
        write(0, 'RIFF');
        dv.setUint32(4, 36 + dataBytes, true);
        write(8, 'WAVE');
        write(12, 'fmt ');
        dv.setUint32(16, 16, true);
        dv.setUint16(20, 1, true);
        dv.setUint16(22, channels, true);
        dv.setUint32(24, sr, true);
        dv.setUint32(28, sr * channels * 2, true);
        dv.setUint16(32, channels * 2, true);
        dv.setUint16(34, 16, true);
        write(36, 'data');
        dv.setUint32(40, dataBytes, true);
        let offset = 44;
        for (let c = 0; c < globalRecChunksL.length; c += 1) {
          const left = globalRecChunksL[c];
          const right = globalRecChunksR[c];
          for (let i = 0; i < left.length; i += 1) {
            const lv = Math.max(-1, Math.min(1, left[i] || 0));
            const rv = Math.max(-1, Math.min(1, right[i] || 0));
            dv.setInt16(offset, lv < 0 ? lv * 0x8000 : lv * 0x7fff, true);
            offset += 2;
            dv.setInt16(offset, rv < 0 ? rv * 0x8000 : rv * 0x7fff, true);
            offset += 2;
          }
        }
        globalRecChunksL = [];
        globalRecChunksR = [];
        globalRecFrames = 0;
        const blob = new Blob([wav], { type: 'audio/wav' });
        if (!blob || blob.size < 1) return;
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        await saveBlobWithDialog(blob, `denarrator-master-${stamp}.wav`);
        void releaseHostTapRuntime();
        showMidiToast('Rec sum saved');
      }

      if (midiBtn) {
        midiBtn.addEventListener('click', () => {
          midiPanelOpen = !midiPanelOpen;
          updateMidiUi();
        });
      }
      if (midiCloseBtn) {
        midiCloseBtn.addEventListener('click', () => {
          midiPanelOpen = false;
          updateMidiUi();
        });
      }
      if (midiMapToggleBtn) {
        midiMapToggleBtn.addEventListener('click', () => {
          midiMapMode = !midiMapMode;
          if (!midiMapMode) clearMidiArmedTarget();
          updateMidiUi();
          broadcastMapMode();
        });
      }
      if (midiRefreshBtn) {
        midiRefreshBtn.addEventListener('click', () => { void refreshMidiDevices(); });
      }
      if (midiConnectBtn) {
        midiConnectBtn.addEventListener('click', () => { void connectMidiDevice(); });
      }
      if (midiDisconnectBtn) {
        midiDisconnectBtn.addEventListener('click', () => { void disconnectMidiDevice(); });
      }
      if (midiSaveSeshBtn) {
        midiSaveSeshBtn.addEventListener('click', () => { void saveMidiSesh(); });
      }
      if (midiLoadSeshBtn) {
        midiLoadSeshBtn.addEventListener('click', () => { void loadMidiSeshFromDialog(); });
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && midiArmedTargetId) {
          clearMidiArmedTarget();
          updateMidiUi();
          return;
        }
        if (event.key === 'Escape' && browserChooserResolver) {
          browserCloseChooser(null);
          return;
        }
        if (event.key === 'Escape' && browserPanelOpen) {
          setBrowserOpen(false);
        }
        if (event.key === 'Escape' && !quitModalBackdrop?.classList.contains('hidden')) {
          setQuitModalOpen(false);
        }
      });

      if (quitSaveBtn) {
        quitSaveBtn.addEventListener('click', async () => {
          const suggested = await suggestSessionTitle();
          if (quitTitleInput) quitTitleInput.value = suggested;
          quitModalStep1?.classList.add('hidden');
          quitModalStep2?.classList.remove('hidden');
          quitTitleInput?.focus();
          quitTitleInput?.select();
        });
      }
      if (quitDontBtn) {
        quitDontBtn.addEventListener('click', async () => {
          const invoke = getInvoke();
          setQuitModalOpen(false);
          if (invoke) await invoke('app_quit');
        });
      }
      if (quitCancelBtn) {
        quitCancelBtn.addEventListener('click', () => {
          setQuitModalOpen(false);
        });
      }
      if (quitTitleCancelBtn) {
        quitTitleCancelBtn.addEventListener('click', () => {
          quitModalStep2?.classList.add('hidden');
          quitModalStep1?.classList.remove('hidden');
        });
      }
      if (quitTitleOkBtn) {
        quitTitleOkBtn.addEventListener('click', async () => {
          const title = String(quitTitleInput?.value || '').trim();
          if (!title) return;
          const ok = await saveSessionByTitle(title);
          if (!ok) return;
          const invoke = getInvoke();
          setQuitModalOpen(false);
          if (invoke) await invoke('app_quit');
        });
      }


      function canvasMetrics() {
        const ratio = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.floor(meterCanvas.clientWidth * ratio));
        const height = Math.max(1, Math.floor(meterCanvas.clientHeight * ratio));
        const meterTop = Math.max(Math.round(2 * ratio), Math.round(height * 0.048));
        const meterBottom = Math.min(height - Math.round(2 * ratio), Math.round(height * 0.964));
        const meterHeight = Math.max(1, meterBottom - meterTop);
        const limiterY = Math.round(height * 0.004);
        const limiterH = Math.max(Math.round(8 * ratio), Math.round(height * 0.03));
        const limiterPadX = Math.max(Math.round(2 * ratio), Math.round(width * 0.1));
        const limiterX = limiterPadX;
        const limiterW = Math.max(Math.round(8 * ratio), width - (limiterPadX * 2));
        const sliderHitMinX = Math.round(width * 0.16);
        const sliderHitMaxX = Math.round(width * 0.88);
        return {
          ratio,
          width,
          height,
          meterTop,
          meterBottom,
          meterHeight,
          limiterX,
          limiterY,
          limiterW,
          limiterH,
          sliderHitMinX,
          sliderHitMaxX,
        };
      }

      function updateMasterVolumeFromPointer(clientY) {
        const rect = meterCanvas.getBoundingClientRect();
        const y = clientY - rect.top;
        const { meterTop, meterHeight } = canvasMetrics();
        const ratio = window.devicePixelRatio || 1;
        const yPx = y * ratio;
        const norm = Math.max(0, Math.min(1, (yPx - meterTop) / meterHeight));
        masterVolume = Math.max(0, Math.min(1, 1 - norm));
        broadcastMasterSettings();
      }

      meterCanvas.addEventListener('pointerdown', (event) => {
        const rect = meterCanvas.getBoundingClientRect();
        const localX = event.clientX - rect.left;
        const localY = event.clientY - rect.top;
        const { sliderHitMinX, sliderHitMaxX } = canvasMetrics();
        const sliderMinCss = (sliderHitMinX / (window.devicePixelRatio || 1));
        const sliderMaxCss = (sliderHitMaxX / (window.devicePixelRatio || 1));
        const inLimiterRect = limiterRect
          && localX >= limiterRect.x
          && localX <= limiterRect.x + limiterRect.w
          && localY >= limiterRect.y
          && localY <= limiterRect.y + limiterRect.h;
        if (inLimiterRect) {
          limiterEnabled = !limiterEnabled;
          broadcastMasterSettings();
          return;
        }
        const sliderHit = localX >= sliderMinCss && localX <= sliderMaxCss
          && (!limiterRect || localY >= limiterRect.y + limiterRect.h);
        if (!sliderHit) {
          return;
        }
        draggingVolume = true;
        meterCanvas.setPointerCapture(event.pointerId);
        updateMasterVolumeFromPointer(event.clientY);
      });
      meterCanvas.addEventListener('pointermove', (event) => {
        if (!draggingVolume) return;
        updateMasterVolumeFromPointer(event.clientY);
      });
      const stopVolumeDrag = () => {
        draggingVolume = false;
      };
      meterCanvas.addEventListener('pointerup', stopVolumeDrag);
      meterCanvas.addEventListener('pointercancel', stopVolumeDrag);

      function drawMeter() {
        const {
          ratio,
          width,
          height,
          meterTop,
          meterBottom,
          meterHeight,
          limiterX,
          limiterY,
          limiterW,
          limiterH,
        } = canvasMetrics();
        if (meterCanvas.width !== width || meterCanvas.height !== height) {
          meterCanvas.width = width;
          meterCanvas.height = height;
        }

        updateTabPulseVisuals();
        meterTarget *= 0.965;
        meterLevel = Math.max(meterTarget, meterLevel * 0.9);
        meterCtx.clearRect(0, 0, width, height);
        if (meterSvgReady) {
          meterCtx.drawImage(meterSvgImage, 0, 0, width, height);
        }

        const meterCenterX = width * 0.5;
        const laneGap = Math.max(1, width * 0.06);
        const barWidth = Math.max(2, width * 0.09);
        const x1 = Math.round(meterCenterX - laneGap - barWidth);
        const x2 = Math.round(meterCenterX + laneGap);
        const x3 = Math.round(width * 0.72);
        const boosted = Math.max(0, Math.min(1, meterLevel * 2.8));
        const visualLevel = Math.pow(boosted, 0.33);
        const activeHeight = Math.max(Math.round(3 * ratio), meterHeight * visualLevel);
        const activeTop = meterBottom - activeHeight;

        const baseGrad = meterCtx.createLinearGradient(0, meterTop, 0, meterBottom);
        baseGrad.addColorStop(0, 'rgba(33, 35, 36, 0.78)');
        baseGrad.addColorStop(0.72, 'rgba(68, 72, 74, 0.55)');
        baseGrad.addColorStop(1, 'rgba(110, 114, 116, 0.38)');
        meterCtx.fillStyle = baseGrad;
        meterCtx.fillRect(x1, meterTop, barWidth, meterHeight);
        meterCtx.fillRect(x2, meterTop, barWidth, meterHeight);

        const activeGrad = meterCtx.createLinearGradient(0, meterTop, 0, meterBottom);
        activeGrad.addColorStop(0, 'rgba(231, 163, 95, 0.98)');
        activeGrad.addColorStop(0.2, 'rgba(120, 107, 92, 0.95)');
        activeGrad.addColorStop(1, 'rgba(233, 226, 214, 0.88)');
        meterCtx.fillStyle = activeGrad;
        meterCtx.fillRect(x1, activeTop, barWidth, activeHeight);
        meterCtx.fillRect(x2, activeTop, barWidth, activeHeight);

        const markerY = Math.max(meterTop, activeTop);
        const markerHeight = Math.max(2, Math.round(2 * ratio));
        meterCtx.fillStyle = 'rgba(245, 246, 246, 0.95)';
        meterCtx.fillRect(x1 - Math.round(1 * ratio), markerY, barWidth + Math.round(2 * ratio), markerHeight);
        meterCtx.fillRect(x2 - Math.round(1 * ratio), markerY, barWidth + Math.round(2 * ratio), markerHeight);

        const limBoxW = limiterW;
        const limBoxH = limiterH;
        const limX = limiterX;
        const limY = limiterY;
        limiterRect = {
          x: limX / ratio,
          y: limY / ratio,
          w: limBoxW / ratio,
          h: limBoxH / ratio,
        };
        meterCtx.fillStyle = limiterEnabled ? 'rgba(231, 163, 95, 0.9)' : 'rgba(88, 92, 94, 0.3)';
        meterCtx.fillRect(limX, limY, limBoxW, limBoxH);
        meterCtx.strokeStyle = 'rgba(231, 234, 236, 0.9)';
        meterCtx.lineWidth = Math.max(1, Math.round(1 * ratio));
        meterCtx.strokeRect(limX, limY, limBoxW, limBoxH);
        meterCtx.fillStyle = 'rgba(240, 242, 244, 0.95)';
        meterCtx.font = `${Math.max(6, Math.round(7 * ratio))}px Avenir Next, Segoe UI, sans-serif`;
        meterCtx.fillText('LIM', limX + Math.round(2 * ratio), limY + Math.round(8 * ratio));

        meterCtx.strokeStyle = 'rgba(58, 60, 61, 0.7)';
        meterCtx.lineWidth = Math.max(1, Math.round(2 * ratio));
        meterCtx.beginPath();
        meterCtx.moveTo(x3, limY + limBoxH + Math.round(2 * ratio));
        meterCtx.lineTo(x3, meterBottom);
        meterCtx.stroke();

        const volY = meterTop + (1 - masterVolume) * meterHeight;
        const tickHalf = Math.max(5, Math.round(6 * ratio));
        meterCtx.strokeStyle = 'rgba(34, 35, 36, 0.76)';
        meterCtx.lineWidth = Math.max(2, Math.round(3 * ratio));
        meterCtx.beginPath();
        meterCtx.moveTo(x3 - tickHalf, volY);
        meterCtx.lineTo(x3 + tickHalf, volY);
        meterCtx.stroke();

        hostMeterHistory.push(meterLevel);
        if (hostMeterHistory.length > HOST_METER_HISTORY_MAX) {
          hostMeterHistory.splice(0, hostMeterHistory.length - HOST_METER_HISTORY_MAX);
        }
        const nowMs = Date.now();
        const frameEveryMs = Math.max(8, Math.round(1000 / Math.max(1, nuklearFps)));
        if (nuklearSubscribed && nowMs - lastNuklearFrameAt >= frameEveryMs) {
          lastNuklearFrameAt = nowMs;
          const frameCount = Math.max(128, Math.min(2048, nuklearFftSize));
          let payload = null;
          if (hostTapReady && hostTapAnalyserL && hostTapAnalyserR && hostTapAnalyserF) {
            const timeL = new Float32Array(frameCount);
            const timeR = new Float32Array(frameCount);
            const fftBinCount = Math.max(64, Math.floor(frameCount / 2));
            const freqBytes = new Uint8Array(fftBinCount);
            hostTapAnalyserL.fftSize = frameCount;
            hostTapAnalyserR.fftSize = frameCount;
            hostTapAnalyserF.fftSize = frameCount;
            hostTapAnalyserL.getFloatTimeDomainData(timeL);
            hostTapAnalyserR.getFloatTimeDomainData(timeR);
            hostTapAnalyserF.getByteFrequencyData(freqBytes);
            const freq = new Float32Array(fftBinCount);
            let sumSq = 0;
            let peak = 0;
            let dot = 0;
            let sumL = 0;
            let sumR = 0;
            for (let i = 0; i < frameCount; i += 1) {
              const l = Number(timeL[i] || 0);
              const r = Number(timeR[i] || 0);
              sumSq += ((l * l) + (r * r)) * 0.5;
              dot += l * r;
              sumL += l * l;
              sumR += r * r;
              peak = Math.max(peak, Math.abs(l), Math.abs(r));
            }
            for (let i = 0; i < fftBinCount; i += 1) {
              freq[i] = (freqBytes[i] || 0) / 255;
            }
            meterTarget = Math.max(meterTarget, peak);
            const rms = Math.sqrt(sumSq / Math.max(1, frameCount));
            const corr = dot / (Math.sqrt(sumL * sumR) + 1e-9);
            payload = {
              sr: hostTapAudioContext?.sampleRate || 48000,
              fftSize: frameCount,
              timeL: Array.from(timeL),
              timeR: Array.from(timeR),
              freq: Array.from(freq),
              rms,
              peak,
              corr: Math.max(-1, Math.min(1, corr)),
              tsMs: nowMs,
            };
          } else {
            const time = new Float32Array(frameCount);
            const start = Math.max(0, hostMeterHistory.length - frameCount);
            const source = hostMeterHistory.slice(start);
            for (let i = 0; i < frameCount; i += 1) {
              const idx = Math.floor((i / Math.max(1, frameCount - 1)) * Math.max(0, source.length - 1));
              const v = Number(source[idx] || 0);
              time[i] = Math.max(-1, Math.min(1, (v * 2) - 1));
            }
            const freqBins = Math.max(64, Math.floor(frameCount / 2));
            const freq = new Float32Array(freqBins);
            for (let i = 0; i < freqBins; i += 1) {
              const f = i / Math.max(1, freqBins - 1);
              const falloff = 1 - f;
              const noise = Math.random() * 0.04;
              freq[i] = Math.max(0, Math.min(1, meterLevel * (0.12 + falloff * 0.88) + noise));
            }
            payload = {
              sr: 48000,
              fftSize: frameCount,
              timeL: Array.from(time),
              timeR: Array.from(time),
              freq: Array.from(freq),
              rms: meterLevel * 0.7,
              peak: meterLevel,
              corr: 1,
              tsMs: nowMs,
            };
          }
          postToFrame(nuklearFrame, {
            type: 'NUKLEAR_FRAME',
            version: 1,
            payload,
          });
        }

        requestAnimationFrame(drawMeter);
      }

      (async () => {
        const invoke = getInvoke();
        if (invoke) {
          try {
            denPaths = await ensureDenarratorPaths();
          } catch {
            // Continue without path bootstrap in web fallback mode.
          }
        }
        broadcastMasterSettings();
        browserRestoreUi();
        for (const caps of browserDefaultsCaps) {
          browserCapsRegistry.set(String(caps.moduleId || '').toLowerCase(), caps);
        }
        browserRenderList();
        installTactileButtons(document);
        applyGlobalTactileToFrames();
        const savedSquish = (() => {
          try { return localStorage.getItem('denarrator.ui.squish'); } catch { return null; }
        })();
        setSquishEnabled(savedSquish !== '0');
        updateGlobalPlayIndicator();
        void ensureHostAudioRuntime();
        void setupTauriMidiListener();
        try {
          const listen = window.__TAURI__?.event?.listen;
          if (typeof listen === 'function') {
            await listen('denarrator://quit-requested', () => {
              void requestQuitFlow();
            });
          }
        } catch {}
        void refreshMidiDevices();
        updateMidiUi();
        broadcastMapMode();
        broadcastPathsToAllFrames();
        try {
          const savedEq = localStorage.getItem('denarrator.izer.eq.lazy') || localStorage.getItem('denarrator.izer.groups');
          if (savedEq) {
            const parsed = JSON.parse(savedEq);
            postToFrame(lazyFrame, {
              type: 'LAZY_IZER_EQ_SET',
              version: 1,
              payload: parsed,
            });
          }
        } catch {}
        requestAnimationFrame(drawMeter);
      })();

      window.setTimeout(() => {
        if (!splashEl) return;
        splashEl.classList.add('hidden');
        window.setTimeout(() => {
          splashEl.remove();
        }, 260);
      }, 1000);

      window.addEventListener('beforeunload', (event) => {
        if (!isAnyDirty()) return;
        event.preventDefault();
        event.returnValue = '';
      });
    </script>
  </body>
</html>
